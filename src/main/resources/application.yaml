spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  liquibase:
    enabled: false

library:
  fine:
    rates:
      STANDARD:
        daily-rate: 1000
        grace-days: 0
      STUDENT:
        daily-rate: 500
        grace-days: 1
      PREMIUM:
        daily-rate: 0
        grace-days: 3
    max-fine-cap-enabled: true

  loan:
    period-days: 14
    extension-days: 7
    max-extensions: 1