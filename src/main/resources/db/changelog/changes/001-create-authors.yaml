databaseChangeLog:
  - changeSet:
      id: 001-create-authors
      author: dilnur
      changes:
        - createTable:
            tableName: authors
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: bio
                  type: TEXT